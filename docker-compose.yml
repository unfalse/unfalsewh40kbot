services:
  vox-logis-bot:
    build: .
    container_name: vox-logis-bot
    restart: unless-stopped
    network_mode: "host"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MESSAGES=${MESSAGES:-lexmechanic.yaml}
      - LLM=${LLM}
      - LLM_HOST=${LLM_HOST}
      - LLM_TOKENS_WEATHER=${LLM_TOKENS_WEATHER}
      - LLM_TOKENS_SUMMARY=${LLM_TOKENS_SUMMARY}
      - LLM_TOKENS_ERROR=${LLM_TOKENS_ERROR}
      - LLM_TOKENS_CHAT=${LLM_TOKENS_CHAT}
      - LLM_TOKENS_PLAIN=${LLM_TOKENS_PLAIN}
      - LLM_TOKENS_WHASK=${LLM_TOKENS_WHASK}
      - DATA_DIR=/app/data
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bot-data:
